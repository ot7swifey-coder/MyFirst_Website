<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="login-container">
        <h2>Welcome Back</h2>
        <p>Please login to your account</p>
        
        <form id="loginForm">
            
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="Enter your Email">
            </div>

            <!-- Updated Password Input and Icon -->
    <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your Password">
        <i class="fa-solid fa-eye" id="togglePassword"></i>
    </div>

            <button type="submit" class="login-btn">Login</button>
        </form>

        <div class="form-footer">
            <p>Don't have an account? 
            <a href="#">Sign up</a>
            </p>
        </div>
    </div>

    <script>
        // HTML elements ko select kar rahe hain
        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const togglePassword = document.getElementById('togglePassword');

        // ====== LOGIC 1: Show/Hide Password ======
    togglePassword.addEventListener('click', function () {
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
        this.className = 'fa-solid fa-eye-slash';
    } else {
        passwordInput.type = 'password';
        this.className = 'fa-solid fa-eye';
    }
    });

        // ====== LOGIC 2: Empty Fields Check (Validation) ======
        loginForm.addEventListener('submit', function (event) {
            const emailValue = emailInput.value.trim();
            const passwordValue = passwordInput.value.trim();

            // Agar email ya password dono mein se koi bhi khali hai
            if (emailValue === "" || passwordValue === "") {
                event.preventDefault(); // Form ko submit hone se rokna
                alert("Please fill both the fields");
            } else {
                alert("Login Successful! Processing...");
            }
        });
    </script>
</body>
</html>
